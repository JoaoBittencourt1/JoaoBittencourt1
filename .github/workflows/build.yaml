name: README build

on:
  push:
    branches:
      - main
  schedule:
    # roda todo dia às 04:00 UTC (01:00 no horário de Brasília)
    - cron: "0 4 * * *"
  workflow_dispatch: # permite rodar manualmente pela aba Actions

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Get Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/cache/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: python -m pip install -r cache/requirements.txt

      - name: Update SVG files
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: JoaoBittencourt1
        run: python today.py

      - name: Commit
        run: |-
          git add .
          git diff
          git config --global user.email "github-actions-bot@users.noreply.github.com"
          git config --global user.name "GitHub Actions Bot"
          git commit -m "Updated README" -a || echo "No changes to commit"
          git push
